<section
  class="relative mt-10 md:mt-20 px-8 mx-auto py-12 md:pt-26 bg-gradient-to-br from-black via-gray-900 to-black fade-in"
  id="contact"
  trackSection="contact"
>
  <div
    class="absolute top-20 left-20 w-72 h-72 bg-[#DD0031]/20 rounded-full blur-3xl animate-pulse"
  ></div>
  <div
    class="absolute bottom-20 right-20 w-96 h-96 bg-[#DD0031]/10 rounded-full blur-3xl -z-10 animate-pulse"
  ></div>
  <h2 class="text-white">{{ "contact.title" | translate }}</h2>
  <div class="flex flex-col gap-4 items-center">
    <p class="mt-3 text-lg md:text-xl text-gray-300 max-w-prose">
      {{ "contact.description" | translate }}
    </p>
    <div
      class="inline-flex items-center gap-2 px-4 py-2 bg-white/10 backdrop-blur-sm rounded-full mb-12"
      style="opacity: 1; transform: none"
    >
      <div
        class="w-2 h-2 bg-green-400 rounded-full animate-pulse"
        data-fg-d3bl354="0.8:48.17762:/src/app/App.tsx:1001:13:49712:71:e:div:_"
        data-fgid-d3bl354=":rb4:"
      ></div>
      <span class="text-gray-300 font-medium">{{
        "contact.timezone" | translate
      }}</span>
    </div>
  </div>

  <div class="flex flex-col sm:flex-row justify-center gap-4 mb-16">
    <a
      class="flex items-center justify-center gap-3 px-8 py-4 bg-gradient-to-r from-[#DD0031] to-[#FF1744] rounded-2xl hover:shadow-2xl transition-all font-semibold text-lg text-white hover:scale-105 duration-300"
      [href]="networks()[2].url"
      target="_blank"
      (click)="trackClick('gmail')"
    >
      {{ "contact.sendEmail" | translate }}
      <lucide-icon name="mail"></lucide-icon>
    </a>
    <a
      class="flex items-center justify-center gap-3 px-8 py-4 bg-gradient-to-r from-gray-700 to-gray-900 rounded-2xl hover:shadow-2xl transition-all font-semibold text-lg text-white hover:scale-105 duration-300"
      [href]="networks()[1].url"
      target="_blank"
      (click)="trackClick('github')"
    >
      {{ "contact.viewGithubProfile" | translate }}
      <lucide-icon name="github"></lucide-icon>
    </a>
    <a
      class="flex items-center justify-center gap-3 px-8 py-4 bg-gradient-to-r from-blue-600 to-blue-800 rounded-2xl hover:shadow-2xl transition-all font-semibold text-lg text-white hover:scale-105 duration-300"
      [href]="networks()[0].url"
      target="_blank"
      (click)="trackClick('linkedin')"
    >
      {{ "contact.visitProfile" | translate }}
      <lucide-icon name="linkedin"></lucide-icon>
    </a>
  </div>
</section>
