<main class="my-10 md:my-20 px-4 fade-in relative" trackSection="about">
  <div
    class="absolute top-20 left-20 w-72 h-72 bg-[#DD0031]/20 rounded-full blur-3xl animate-pulse"
  ></div>
  <div
    class="absolute bottom-20 right-20 w-96 h-96 bg-[#DD0031]/10 rounded-full blur-3xl -z-10 animate-pulse"
  ></div>

  <div class="max-w-[1200px] mx-auto pt-12 md:pt-26">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
      <div class="col-span-2">
        <h1
          class="text-5xl md:text-7xl font-bold text-black text-center md:text-left"
          [innerHTML]="cv().name"
        ></h1>
        <div
          class="h-1.5 w-32 bg-gradient-to-r from-[#DD0031] to-black mb-6 rounded-full origin-left my-6"
          style="transform: none"
        ></div>
        <p
          class="text-lg md:text-3xl text-black font-bold text-center md:text-left"
        >
          {{ cv().summary }}
        </p>
        <div class="mt-5">
          @for (p of cv().about; track $index) {
            <p
              class="mb-3 text-primary text-center md:text-left md:text-lg leading-relaxed"
              [innerHTML]="p"
            ></p>
          }
        </div>
        <div class="flex gap-3 justify-center md:justify-start mt-5">
          <download-cv-button />
          <copy-to-clipboard
            [textToCopy]="cv().email"
            [label]="'about.copyEmail' | translate"
          />
        </div>
        <div class="flex justify-center md:justify-start gap-3 mt-5">
          @for (item of cv().socialNetworks; track $index) {
            <div
              class="flex items-center justify-center bg-black hover:bg-primary-500 size-14 rounded-2xl p-1 px-4 hover:scale-110 transition-transform"
            >
              <a
                class="text-white"
                [href]="item.url"
                target="_blank"
                rel="noopener noreferrer"
                (click)="trackSocialClick(item.name)"
              >
                <i-lucide [name]="item.icon" [size]="24"></i-lucide>
              </a>
            </div>
          }
        </div>
      </div>
      <div class="relative hidden lg:block">
        <img
          class="size-2/3 levitar absolute left-0 right-0 mx-auto angular-drop-shadow"
          [src]="'angular' | icon"
          alt="Logo de Angular"
        />
        <img
          class="size-1/4 levitar absolute left-10 bottom-24 spring-drop-shadow"
          [src]="'spring' | icon"
          alt="Logo de Spring"
        />
        <img
          class="size-1/4 levitar absolute right-10 bottom-24 nest-drop-shadow"
          [src]="'nestjs' | icon"
          alt="Logo de NestJS"
        />
      </div>
    </div>
  </div>
</main>

<section
  class="max-w-[1200px] mx-auto my-10 md:my-20 px-4 slide-in-bottom"
  trackSection="skills"
>
  <h2>{{ "skills.title" | translate }}</h2>
  <div class="flex justify-center">
    <div
      class="h-1.5 w-32 bg-gradient-to-r from-[#DD0031] to-black mb-8 rounded-full origin-left"
    ></div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
    <skills
      [header]="'skills.languages' | translate"
      bgIcon="code"
      [skills]="cv().skills.languages"
    ></skills>
    <skills
      [header]="'skills.frameworks' | translate"
      bgIcon="square-library"
      [skills]="cv().skills.frameworks"
    ></skills>
    <skills
      [header]="'skills.databases' | translate"
      bgIcon="database"
      [skills]="cv().skills.databases"
    ></skills>
    <skills
      [header]="'skills.others' | translate"
      bgIcon="waypoints"
      [skills]="cv().skills.others"
    ></skills>
  </div>
</section>
