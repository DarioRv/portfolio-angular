<article
  class="flex flex-col p-4 shadow-xl border-2 border-transparent rounded-xl hover:shadow-2xl hover:border-primary-500 transition-all duration-300 group"
>
  <div class="">
    <div class="flex flex-col gap-3 mb-5">
      <div class="flex items-center gap-2">
        <div
          class="h-1 w-12 bg-gradient-to-r from-[#DD0031] to-black rounded-full origin-left"
        ></div>
        <h5 class="text-sm font-bold tracking-wide text-primary-500">
          EDUCACIÓN UNIVERSITARIA
        </h5>
      </div>
      <h5
        class="text-black text-lg md:text-4xl font-bold group-hover:text-primary-500 transition duration-300"
      >
        {{ education().title }}
      </h5>
      <span class="text-primary text-base flex items-center gap-2 font-bold">
        <i-lucide name="university" size="16"></i-lucide>
        {{ education().institution }}
      </span>
      <span class="text-primary text-base flex items-center gap-2">
        <i-lucide name="calendar-days" size="16"></i-lucide>
        {{ education().period }}
      </span>
    </div>
    <div>
      @for (item of education().description; track $index) {
        <p class="mb-3 text-primary text-base">{{ item }}</p>
      }
    </div>
  </div>
</article>
