@switch (design()) {
  @case ("default") {
    <div
      class="flex gap-2 items-center rounded-full text-black"
      [ngClass]="styleClass"
    >
      <img
        class="h-4 aspect-auto"
        [src]="tech().icon | icon"
        [alt]="tech().label"
        height="16"
      />
      <span class="text-nowrap text-xs">{{ tech().label }}</span>
    </div>
  }
  @case ("simple") {
    <span
      class="px-4 py-2 text-sm bg-black/5 text-black bg-gray-50 border border-gray-200 rounded-xl"
      [ngClass]="styleClass"
      >{{ tech().label }}</span
    >
  }
  @case ("badge") {
    <div
      class="flex flex-col items-center gap-2 px-3 py-1 text-sm text-black"
      [ngClass]="styleClass"
    >
      <img
        class="h-6 aspect-auto"
        [src]="tech().icon | icon"
        [alt]="tech().label"
        height="24"
      />
      <span class="text-nowrap">{{ tech().label }}</span>
    </div>
  }
  @case ("badge-horizontal") {
    <div
      class="flex items-center gap-2 px-3 py-2 text-sm text-black border border-black/10 rounded-lg"
      [ngClass]="styleClass"
    >
      <img
        class="h-6 aspect-auto"
        [src]="tech().icon | icon"
        [alt]="tech().label"
        height="24"
      />
      <span class="text-nowrap">{{ tech().label }}</span>
    </div>
  }
}
