<nav class="group">
  <div class="absolute inset-0 opacity-10">
    <div
      class="absolute inset-0"
      style="
        background-image: radial-gradient(circle, white 1px, transparent 1px);
        background-size: 20px 20px;
      "
    ></div>
  </div>
  <div>
    <ul
      class="flex flex-row gap-5 justify-center md:gap-3 p-2 md:p-4 rounded-t-xl md:rounded-xl backdrop-blur-2xl w-full"
    >
      @for (item of menuItems; track $index) {
        <li>
          <a
            class="hidden md:inline py-2 px-4 rounded-xl text-white hover:text-primary-500 font-medium transition-colors"
            [routerLink]="item.routerLink"
            [fragment]="item.fragment"
            queryParamsHandling="preserve"
            >{{ item.label }}</a
          >
          <a
            class="md:hidden"
            [routerLink]="item.routerLink"
            routerLinkActive="text-primary-500"
            [fragment]="item.fragment"
            queryParamsHandling="preserve"
          >
            <div class="p-2 rounded-full bg-white/10">
              <lucide-icon [name]="item.icon" size="24"></lucide-icon>
            </div>
          </a>
        </li>
      }
    </ul>
  </div>
</nav>
