@if (bgIcon()) {
  <lucide-icon
    [name]="bgIcon()"
    class="absolute right-2 bottom-2 text-black/10 pointer-events-none z-0 group-hover:text-primary-500/10 transition-colors duration-300"
    size="80"
  ></lucide-icon>
}
<h4
  class="relative z-10 mb-4 text-black font-semibold uppercase tracking-wider text-sm"
>
  {{ header() }}
</h4>
<div class="relative z-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  @for (item of skills(); track $index) {
    <div
      class="flex flex-col justify-center items-center gap-3 p-3 rounded-lg transition-all duration-300 hover:bg-black/5 hover:shadow-md active:scale-95"
    >
      <img
        class="size-10 transition-transform duration-300 hover:scale-110"
        [src]="item.icon | icon"
        [alt]="item.label"
        width="40"
        height="40"
        [title]="item.label"
      />
      <h5 class="text-secondary text-center font-medium text-sm">
        {{ item.label }}
      </h5>
    </div>
  }
</div>
