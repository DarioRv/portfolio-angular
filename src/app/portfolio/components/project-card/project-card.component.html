<article
  class="rounded-2xl border-2 border-transparent overflow-hidden shadow-xl transition hover:shadow-2xl group duration-300 hover:border-primary-500 z-40"
>
  <div class="grid grid-cols-1 lg:grid-cols-[1.15fr_1fr]">
    <div class="relative">
      <div class="aspect-[16/10]">
        <dv-image-galery
          [images]="project().images"
          design="simple"
        ></dv-image-galery>
      </div>
    </div>

    <div class="p-6 md:p-8">
      <div class="flex items-center gap-2 mb-4">
        <div
          class="h-1 w-12 bg-gradient-to-r from-[#DD0031] to-black rounded-full origin-left"
        ></div>
        <h5 class="text-sm font-bold tracking-wide text-primary-500">
          {{ project().type | uppercase }}
        </h5>
      </div>
      <div class="flex items-start justify-between gap-4">
        <div>
          <h3
            class="text-3xl md:text-4xl font-bold text-black group-hover:text-primary-500 transition"
          >
            {{ project().title }}
          </h3>
          <p class="mt-2 text-primary leading-relaxed">
            {{ project().summary }}
          </p>
        </div>
      </div>

      <div class="mt-5 flex flex-wrap gap-2 gap-y-6">
        @for (tech of project().technologies; track $index) {
          <tech-chip
            [tech]="tech"
            design="simple"
            styleClass="hover:bg-primary-500 hover:text-white shadow-lg"
          ></tech-chip>
        }
      </div>

      <div class="mt-6 h-px bg-black/10"></div>

      <div class="mt-6 flex flex-wrap gap-3">
        @if (project().demo) {
          <a
            class="flex gap-2 items-center px-4 py-2 transition text-base font-semibold bg-gray-200 text-black hover:scale-105 rounded-xl duration-300"
            [href]="project().demo"
            target="_blank"
            rel="noopener"
            (click)="trackProjectCardInteraction(project().title, 'view_demo')"
          >
            {{ "projects.viewDemo" | translate }}
            <i-lucide name="external-link" size="16"></i-lucide>
          </a>
        }
        <!-- @if (project().github) {
          <a
            class="flex gap-2 items-center px-4 py-2 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition text-base"
            [href]="project().github"
            target="_blank"
            rel="noopener noreferrer"
            (click)="
              trackProjectCardInteraction(project().title, 'view_repository')
            "
          >
            {{ "projects.repository" | translate }}
            <i-lucide name="external-link" size="14"></i-lucide>
          </a>
        } -->
        <a
          class="flex gap-2 items-center px-4 py-2 transition text-base font-semibold bg-primary-500 hover:scale-105 rounded-xl text-white duration-300"
          [routerLink]="['/projects', project().key]"
          (click)="trackProjectCardInteraction(project().title, 'view_details')"
        >
          {{ "projects.viewDetails" | translate }}
          <i-lucide name="chevron-right" size="16"></i-lucide>
        </a>
      </div>
    </div>
  </div>
</article>
